<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的博客</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo">博客</a>
            <div class="nav-links">
                <a href="index.html">首页</a>
                <a href="about.html">关于</a>
                <a href="search.html">搜索</a>
            </div>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1>欢迎来到我的博客</h1>
            <p>记录生活，分享技术</p>
        </section>

        <section class="filters">
            <div class="categories">
                <span class="filter-label">分类：</span>
                <button class="category-btn active" data-category="all">全部</button>
                <button class="category-btn" data-category="tech">技术</button>
                <button class="category-btn" data-category="life">生活</button>
                <button class="category-btn" data-category="notes">笔记</button>
            </div>
            <div class="tags">
                <span class="filter-label">标签：</span>
                <span class="tag" data-tag="all" onclick="filterByTag('all')">全部</span>
                <span class="tag" data-tag="javascript" onclick="filterByTag('javascript')">javascript</span>
                <span class="tag" data-tag="python" onclick="filterByTag('python')">python</span>
                <span class="tag" data-tag="css" onclick="filterByTag('css')">css</span>
                <span class="tag" data-tag="随笔" onclick="filterByTag('随笔')">随笔</span>
            </div>
        </section>

        <section class="posts" id="posts-container">
            <!-- Posts will be loaded here by JavaScript -->
        </section>
    </main>

    <footer>
        <p>&copy; 2024 我的博客. 使用纯 HTML 构建</p>
    </footer>

    <script src="js/posts.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
